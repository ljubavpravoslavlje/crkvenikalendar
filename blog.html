<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог - Љубав Православље</title>
    <style>
        body {
            margin: 0;
            /* Твоја магична "srećna" boja peska, sive i purpurne */
            backgroung: #EED69F linear-gradient(135deg, #d3d3d3 0%, #e6e6fa 100%);
            background-image: url("papir.jpg");
            background-size: cover;
            background-attachment: fixed;
            font-family: "Times New Roman", serif;
            color: #4A3728;
            text-align: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 800px; /* Malo šire da blog bolje stane */
            margin: auto;
            padding-top: 60px;
        }

        /* "PROZOR" ZA TVOJ BLOG IZ 2015 */
        .blog-okvir {
            width: 100%;
            height: 75vh; /* Zauzima veći deo ekrana telefona */
            border: 2px solid #8b6f47;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: white; /* Čista bela podloga za lakše čitanje bloga */
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .home-dugme {
            position: fixed; top: 15px; left: 15px;
            background: rgba(242, 230, 201, 0.9);
            padding: 10px 15px; border-radius: 8px;
            border: 1px solid #8b6f47; text-decoration: none; 
            color: #4A3728; font-size: 22px; z-index: 1000;
        }

        h1 { margin-bottom: 10px; font-size: 28px; }
        p { font-style: italic; margin-bottom: 20px; }
    </style>
</head>
